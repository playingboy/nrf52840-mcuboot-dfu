# 1. Base Hardware & Serial Infrastructure
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_MCUBOOT_SERIAL=y

# 2. Force Legacy USB Stack exclusively to resolve the Linker Duplication Error
CONFIG_BOOT_SERIAL_CDC_ACM=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_UART_LINE_CTRL=y

# 4. Turn off competing Text Loggers to prevent Console Interlock Errors
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# 5. Partition size expansion to accommodate the full USB library implementation
CONFIG_PM_PARTITION_SIZE_MCUBOOT=0x12000

CONFIG_MCUBOOT_INDICATION_LED=y
